spring:
  application:
    name: sba-agentic
  datasource:
    url: ${SBA_DATASOURCE_URL:jdbc:sqlite:sba-agentic.db}
    driver-class-name: org.sqlite.JDBC
    hikari:
      # WAL (set once at startup) lets several connections read while one writes; a pool of a few
      # connections plus a busy_timeout means concurrent agents can capture without blocking the UI,
      # and the rare writer-vs-writer overlap waits briefly instead of erroring.
      maximum-pool-size: 4
      connection-test-query: SELECT 1
      connection-init-sql: PRAGMA busy_timeout=5000
  sql:
    init:
      mode: always
  ai:
    mcp:
      server:
        name: sba-agentic
        version: 0.1.0
        protocol: STREAMABLE
        streamable-http:
          mcp-endpoint: /mcp
  mustache:
    check-template-location: false

server:
  port: ${SBA_PORT:8766}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true

sba:
  local-ai:
    enabled: ${SBA_LOCAL_AI_ENABLED:true}
    base-url: ${SBA_LOCAL_AI_BASE_URL:http://localhost:1234}
    chat-path: ${SBA_LOCAL_AI_CHAT_PATH:/v1/chat/completions}
    model: ${SBA_LOCAL_AI_MODEL:local-model}
    api-key: ${SBA_LOCAL_AI_API_KEY:lm-studio}
    timeout: 30s
    max-tokens: 320
    # Per-request char budget for the local model. Transcripts above this are map-reduced (summarized in
    # windows, then folded) instead of overflowing the context. 8000 chars ~= 2.7k tokens of dense
    # transcript, leaving headroom on a 4096-token context after output + system prompt. Raise for bigger
    # context windows; lower it for a 2k-context model.
    max-input-chars: ${SBA_LOCAL_AI_MAX_INPUT_CHARS:8000}
  summary:
    # local = LM Studio/OpenAI-compatible local model. external = run a configured CLI wrapper and
    # pipe the assembled session transcript to stdin, falling back to local when the command fails.
    backend: ${SBA_SUMMARY_BACKEND:local}
    external-command: ${SBA_SUMMARY_EXTERNAL_COMMAND:}
    timeout: ${SBA_SUMMARY_TIMEOUT:10m}
  exports:
    # Export is opt-in through the API/UI. Obsidian is only the shipped example target.
    targets:
      - id: obsidian
        label: Obsidian
        type: markdown-file
        enabled: true
        directory: ${SBA_EXPORT_OBSIDIAN_DIR:${user.home}/Notes/obsidian/99 System/Black Box Summaries}
        template: classpath:/exports/summary-markdown.mustache
        subdirectory-template: "{{month}}"
        filename-template: "{{date}}-{{slug}}-{{shortId}}.md"
  elasticsearch:
    enabled: ${SBA_ELASTICSEARCH_ENABLED:false}
    base-url: ${SBA_ELASTICSEARCH_URL:http://localhost:9200}
    index-name: ${SBA_ELASTICSEARCH_INDEX:sba-agentic-events}
    timeout: 5s
  ask:
    memory-index: ${SBA_ASK_MEMORY_INDEX:agent-memory}
    vector-field: ${SBA_ASK_VECTOR_FIELD:embedding}
    embedding-enabled: ${SBA_ASK_EMBEDDING_ENABLED:true}
    embedding-base-url: ${SBA_ASK_EMBEDDING_URL:http://localhost:11434}
    embedding-path: ${SBA_ASK_EMBEDDING_PATH:/api/embeddings}
    embedding-model: ${SBA_ASK_EMBEDDING_MODEL:nomic-embed-text}
    embedding-dimensions: ${SBA_ASK_EMBEDDING_DIMENSIONS:768}
    embedding-timeout: 5s
    default-ask-citations: ${SBA_ASK_DEFAULT_CITATIONS:6}
    default-retrieve-results: ${SBA_ASK_DEFAULT_RETRIEVE_RESULTS:10}
    answer-max-tokens: ${SBA_ASK_ANSWER_MAX_TOKENS:640}
  ingestion:
    max-text-length: 20000
